services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rnm_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: rnm_mysql
    environment:
      MYSQL_DATABASE: rnm
      MYSQL_USER: rnm
      MYSQL_PASSWORD: rnm
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
